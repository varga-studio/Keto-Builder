<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>Keto‑Baukasten · Varga</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f7f9fc;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #1e293b;
    }
    .container {
      max-width: 850px;
      width: 100%;
      background: white;
      border-radius: 2.5rem;
      padding: 2rem 1.8rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.05);
      margin-bottom: 1.5rem;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4290f5, #f5428a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }
    .lang-btn {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 3rem;
      padding: 0.5rem 1.2rem;
      font-weight: 700;
      cursor: pointer;
      color: #334155;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .lang-btn:hover {
      border-color: #4290f5;
      color: #4290f5;
      background: #f0f7ff;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 1.8rem;
      font-weight: 500;
      font-size: 0.95rem;
    }
    .gerichte-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.2rem;
    }
    .gericht-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 1.5rem;
      padding: 1.2rem 0.8rem 0.8rem;
      width: 140px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      position: relative;
      user-select: none;
    }
    .gericht-card:hover {
      border-color: #b9d3f0;
      transform: translateY(-3px);
      box-shadow: 0 12px 22px rgba(66,144,245,0.12);
    }
    .gericht-card.active-badge {
      border-color: #4290f5;
      background: #f0f7ff;
    }
    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #f5428a;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.8rem;
      box-shadow: 0 2px 6px rgba(245,66,138,0.4);
      border: 2px solid white;
    }
    .gericht-emoji {
      font-size: 2.5rem;
      margin-top: 0.2rem;
    }
    .gericht-name {
      font-weight: 700;
      font-size: 0.9rem;
      line-height: 1.3;
      color: #0f172a;
      margin: 0.4rem 0;
    }
    .gericht-kcal {
      font-size: 0.75rem;
      color: #64748b;
      background: #f1f5f9;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      display: inline-block;
    }

    /* Slots */
    .slots-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 1rem 0 1.8rem;
      flex-wrap: wrap;
    }
    .meal-slot {
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 2rem;
      width: 200px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
      padding: 0.8rem;
      text-align: center;
    }
    .meal-slot.filled {
      border-style: solid;
      border-color: #4290f5;
      background: #f0f7ff;
      cursor: pointer;
    }
    .meal-slot-label {
      font-weight: 700;
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 0.2rem;
    }
    .meal-slot-content {
      font-weight: 700;
      font-size: 1rem;
      color: #0f172a;
      word-break: break-word;
    }
    .meal-slot-emoji {
      font-size: 2rem;
    }
    .remove-slot {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #f5428a;
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      line-height: 1;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .controls {
      display: flex;
      justify-content: center;
      margin: 0.5rem 0 1rem;
    }
    .auswahl-info {
      text-align: center;
      font-weight: 600;
      margin: 0.5rem 0 0.8rem;
      color: #334155;
      background: #f8fafc;
      padding: 0.5rem;
      border-radius: 2rem;
      font-size: 0.9rem;
    }
    .summen-box {
      background: #f0f4ff;
      border-radius: 1.5rem;
      padding: 1.2rem;
      margin: 1.2rem 0;
      border: 1px solid #d9e6f8;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      text-align: center;
    }
    .summen-item {
      font-weight: 600;
    }
    .summen-item span {
      display: block;
      font-size: 1.5rem;
      color: #0f172a;
      font-weight: 700;
    }
    .summen-item small {
      color: #475569;
      font-size: 0.8rem;
    }
    .einkaufsliste {
      margin-top: 1.8rem;
      border-top: 1px solid #e2e8f0;
      padding-top: 1.5rem;
    }
    .einkaufsliste h2 {
      font-size: 1.3rem;
      margin-bottom: 0.8rem;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0.5rem;
    }
    th {
      text-align: left;
      font-weight: 600;
      color: #475569;
      font-size: 0.85rem;
      padding: 0.4rem 0.2rem;
      border-bottom: 1px solid #e2e8f0;
    }
    td {
      padding: 0.5rem 0.2rem;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.95rem;
    }
    .btn {
      display: inline-block;
      margin: 0.6rem 0.5rem 0.2rem 0;
      background: white;
      border: 2px solid #e2e8f0;
      padding: 0.7rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      background: #f8fafc;
      color: #1e293b;
    }
    .btn-primary {
      background: #f5b042;
      border-color: #f5b042;
      color: white;
      box-shadow: 0 6px 14px rgba(245,176,66,0.3);
    }
    .btn-primary:hover {
      background: #f0a028;
    }
    .btn-accent {
      background: white;
      border-color: #f5428a;
      color: #f5428a;
    }
    .btn-accent:hover {
      background: #fff0f5;
    }
    .btn-reset {
      background: white;
      border-color: #4290f5;
      color: #4290f5;
      font-weight: 700;
    }
    .wochen-liste {
      background: #fef9e7;
      border-radius: 1.2rem;
      padding: 1rem;
      margin-top: 1.2rem;
      border-left: 4px solid #f5b042;
    }
    .hinweis {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.3rem;
    }
    hr {
      margin: 1rem 0;
      border: 0.5px solid #e9eef2;
    }
    @media (max-width: 500px) {
      .gericht-card {
        width: 120px;
        padding: 1rem 0.4rem 0.6rem;
      }
      .meal-slot {
        width: 160px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1 id="mainTitle">🥑 Keto‑Baukasten</h1>
    <button class="lang-btn" id="langToggle">🌐 EN</button>
  </div>
  <div class="subtitle" id="subtitle">nach Dr. Berg · 2 Mahlzeiten · &lt;20g KH</div>

  <div class="gerichte-grid" id="gerichtGrid"></div>

  <!-- Zwei Mahlzeiten-Slots -->

  <div class="controls">
    <button class="btn btn-reset" id="btnResetTop">↺ Auswahl zurücksetzen</button>
  </div>

  <div class="auswahl-info" id="auswahlInfo">🔹 Wähle bis zu 2 Gerichte für deinen Tag</div>

  <div class="summen-box" id="summenBox" style="display: none;">
    <div class="summen-item"><small id="labelKcal">Kalorien</small> <span id="sumKcal">0</span> kcal</div>
    <div class="summen-item"><small id="labelProtein">Protein</small> <span id="sumProtein">0</span> g</div>
    <div class="summen-item"><small id="labelFett">Fett</small> <span id="sumFett">0</span> g</div>
    <div class="summen-item"><small id="labelKh">Netto‑KH</small> <span id="sumKh">0</span> g</div>
  </div>

  <div class="einkaufsliste" id="einkaufContainer" style="display: none;">
    <h2 id="shoppingTitle">🛒 Einkaufsliste (1 Tag)</h2>
    <table id="tagesTabelle">
      <thead><tr><th id="thZutat">Zutat</th><th id="thMenge">Menge</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="hinweis" id="hintOil">Öle, Essig, Gewürze & Basics sind nicht aufgeführt.</div>
    <button class="btn btn-primary" id="btnWochen">📆 Wocheneinkauf (×7) anzeigen</button>
    <button class="btn btn-accent" id="btnResetBottom">↺ Auswahl zurücksetzen</button>
    <div id="wochenContainer" style="display: none;" class="wochen-liste"></div>
  </div>
</div>

    const tagesTabelleBody = document.querySelector('#tagesTabelle tbody');

    const btnResetBottom = document.getElementById('btnResetBottom');

    function t(key) {
      return translations[currentLang][key] || key;
    }

    function getDishName(dish) {
      return currentLang === 'de' ? dish.name_de : dish.name_en;
    }

    function getIngredientName(zutat) {
      return currentLang === 'de' ? zutat.name_de : zutat.name_en;
    }

    function translateEinheit(einheit) {
      if (einheit === 'Stück') return t('einheitStueck');
      if (einheit === 'g') return t('einheitGramm');
      return einheit;
    }

    // Count how many times a dish id appears in slots
    function countInSlots(id) {
      return selectedSlots.filter(s => s === id).length;
    }

    // Get array of actual gericht objects from slots (ignoring null)
    function getSelectedGerichte() {
      return selectedSlots.filter(id => id !== null).map(id => gerichte.find(g => g.id === id));
    }

    // Apply language to static texts
    function applyLanguage() {
      document.getElementById('mainTitle').textContent = t('title');
      document.getElementById('subtitle').innerHTML = t('subtitle');
      document.getElementById('labelKcal').textContent = t('labelKcal');

      document.getElementById('labelFett').textContent = t('labelFett');

      document.getElementById('btnResetTop').textContent = t('resetButton');
      document.getElementById('btnResetBottom').textContent = t('resetButton');
      document.getElementById('thZutat').textContent = t('thZutat');
      document.getElementById('thMenge').textContent = t('thMenge');
      langToggle.textContent = t('langBtn');
      renderAll();
    }

      const count = selectedSlots.filter(s => s !== null).length;
      if (count === 0) auswahlInfo.textContent = t('selectInfo0');
      else if (count === 1) auswahlInfo.textContent = t('selectInfo1');
      else auswahlInfo.textContent = t('selectInfo2');
    }

    // Render dish cards with badges
    function renderGrid() {
      grid.innerHTML = '';
      gerichte.forEach(g => {
        const card = document.createElement('div');
        const selCount = countInSlots(g.id);
        card.className = `gericht-card ${selCount > 0 ? 'active-badge' : ''}`;
        card.dataset.id = g.id;
        card.innerHTML = `
          ${selCount > 0 ? `<span class="badge">${selCount}</span>` : ''}
          <div class="gericht-emoji">${g.emoji}</div>
          <div class="gericht-name">${getDishName(g)}</div>
          <div class="gericht-kcal">~${g.kcal} kcal</div>
        `;
        card.addEventListener('click', () => handleGerichtClick(g.id));
        grid.appendChild(card);
      });
    }

    // Slot rendering
    function renderSlots() {
      slotsRow.innerHTML = '';
      for (let i = 0; i < 2; i++) {
        const slotId = selectedSlots[i];
        const gericht = slotId ? gerichte.find(g => g.id === slotId) : null;
        const slotDiv = document.createElement('div');
        slotDiv.className = `meal-slot ${gericht ? 'filled' : ''}`;
        slotDiv.innerHTML = `
          <div class="meal-slot-label">${i === 0 ? t('meal1') : t('meal2')}</div>
          ${gericht ? 
            `<div class="meal-slot-emoji">${gericht.emoji}</div>
             <div class="meal-slot-content">${getDishName(gericht)}</div>
             <button class="remove-slot" data-slot="${i}">${t('slotRemove')}</button>` 
            : 
            `<div class="meal-slot-content" style="color:#94a3b8;">${t('slotEmpty')}</div>`
          }
        `;
        // Click on empty slot could also trigger? Not needed. Remove button handled separately.
        slotDiv.addEventListener('click', (e) => {
          if (e.target.classList.contains('remove-slot')) return; // handled below
          if (!gericht) {
            // Optional: maybe focus? Do nothing.
          }
        });
        slotsRow.appendChild(slotDiv);
      }
      // Add event listeners to remove buttons
      document.querySelectorAll('.remove-slot').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const slotIndex = parseInt(btn.dataset.slot);
          selectedSlots[slotIndex] = null;
          renderAll();
        });
      });
    }

    function handleGerichtClick(id) {
      // Find first empty slot
      const emptyIndex = selectedSlots.findIndex(s => s === null);
      if (emptyIndex === -1) {
        alert(currentLang === 'de' ? 'Beide Mahlzeiten sind bereits ausgewählt. Entferne zuerst eine Mahlzeit über das ×.' : 'Both meals already selected. Remove one first via ×.');
        return;
      }
      selectedSlots[emptyIndex] = id;
      renderAll();
    }

    function renderAll() {
      renderGrid();
      renderSlots();
      updateInfoText();
      updateSummenAndEinkauf();
    }

    function updateSummenAndEinkauf() {
      const selectedGerichte = getSelectedGerichte();
      if (selectedGerichte.length > 0) {
        summenBox.style.display = 'flex';
        einkaufContainer.style.display = 'block';
        
        const totalKcal = selectedGerichte.reduce((s,g) => s + g.kcal, 0);
        const totalProtein = selectedGerichte.reduce((s,g) => s + g.protein, 0);
        const totalFett = selectedGerichte.reduce((s,g) => s + g.fett, 0);
        const totalKh = selectedGerichte.reduce((s,g) => s + g.kh, 0);
        
        sumKcal.textContent = totalKcal;
        sumProtein.textContent = totalProtein;
        sumFett.textContent = totalFett;
        sumKh.textContent = totalKh;
        
        renderTagesEinkauf(selectedGerichte);
      } else {
        summenBox.style.display = 'none';
        einkaufContainer.style.display = 'none';
        wochenContainer.style.display = 'none';
      }
    }

    function aggregateIngredients(selectedGerichte, factor = 1) {
      const map = new Map();
      selectedGerichte.forEach(g => {
        g.zutaten.forEach(z => {
          const key = getIngredientName(z);
          const existing = map.get(key);
          if (existing) {
            existing.mengeGramm += z.mengeGramm * factor;
            existing.mengeStueck += z.mengeStueck * factor;
          } else {
            map.set(key, {
              mengeGramm: z.mengeGramm * factor,
              mengeStueck: z.mengeStueck * factor,
              einheit: z.einheit
            });
          }
        });
      });
      return Array.from(map.entries()).map(([name, val]) => ({ name, ...val }));
    }

    function renderTagesEinkauf(selectedGerichte) {
      const zutaten = aggregateIngredients(selectedGerichte, 1);
      tagesTabelleBody.innerHTML = '';
      zutaten.forEach(z => {
        const row = document.createElement('tr');
        let mengeAnzeige = '';
        const einheitTrans = translateEinheit(z.einheit);
        if (z.einheit === 'Stück') {
          mengeAnzeige = `${z.mengeStueck} ${einheitTrans}`;
          if (z.mengeGramm > 0) mengeAnzeige += ` (${z.mengeGramm} ${t('einheitGramm')})`;
        } else {
          mengeAnzeige = `${z.mengeGramm} ${einheitTrans}`;
        }
        row.innerHTML = `<td>${z.name}</td><td>${mengeAnzeige}</td>`;
        tagesTabelleBody.appendChild(row);
      });
      wochenContainer.style.display = 'none';
    }

    function zeigeWocheneinkauf() {
      const selectedGerichte = getSelectedGerichte();
      if (selectedGerichte.length === 0) {
        alert(t('selectInfo0'));
        return;
      }
      const zutaten = aggregateIngredients(selectedGerichte, 7);
      
      let html = `<h3>${t('weeklyTitle')}</h3><table><thead><tr><th>${t('thZutat')}</th><th>${t('thMenge')}</th></tr></thead><tbody>`;
      zutaten.forEach(z => {
        let mengeAnzeige = '';
        const einheitTrans = translateEinheit(z.einheit);
        if (z.einheit === 'Stück') {
          mengeAnzeige = `${z.mengeStueck} ${einheitTrans}`;
          if (z.mengeGramm > 0) mengeAnzeige += ` (${z.mengeGramm} ${t('einheitGramm')})`;
        } else {
          mengeAnzeige = `${z.mengeGramm} ${einheitTrans}`;
        }
        html += `<tr><td>${z.name}</td><td>${mengeAnzeige}</td></tr>`;
      });
      html += `</tbody></table><div class="hinweis">${t('weekHint')}</div>`;
      wochenContainer.innerHTML = html;
      wochenContainer.style.display = 'block';
    }

    function resetAuswahl() {
      selectedSlots = [null, null];
      renderAll();
      wochenContainer.style.display = 'none';
    }

    // Language toggle
    langToggle.addEventListener('click', () => {
      currentLang = currentLang === 'de' ? 'en' : 'de';
      applyLanguage();
    });

    btnWochen.addEventListener('click', zeigeWocheneinkauf);
    btnResetTop.addEventListener('click', resetAuswahl);
    btnResetBottom.addEventListener('click', resetAuswahl);

    // Initial render
    applyLanguage();
  })();
</script>
</body>
</html>
